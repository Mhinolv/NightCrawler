<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Type Families</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Hanken+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--surface); color:var(--ink); padding:24px 28px; }
  .grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:22px; }
  .role { font-family:var(--font-mono); font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-3); margin:0 0 8px; }
  .big { font-size:44px; line-height:1; margin:0 0 6px; }
  .nm { font-size:13px; font-weight:600; }
  .use { font-size:12px; color:var(--ink-2); margin-top:2px; }
  .serif { font-family:var(--font-serif); }
  .sans { font-family:var(--font-sans); }
  .mono { font-family:var(--font-mono); }
</style>
</head>
<body>
  <div class="grid">
    <div>
      <p class="role">Display</p>
      <p class="big serif">Aa</p>
      <div class="nm serif" style="font-family:var(--font-serif)">Newsreader</div>
      <div class="use">Questions · editorial moments</div>
    </div>
    <div>
      <p class="role">UI / Body</p>
      <p class="big sans">Aa</p>
      <div class="nm">Hanken Grotesk</div>
      <div class="use">All interface text</div>
    </div>
    <div>
      <p class="role">Meta</p>
      <p class="big mono">Aa</p>
      <div class="nm mono" style="font-family:var(--font-mono)">DM Mono</div>
      <div class="use">Kickers · labels · timers</div>
    </div>
  </div>
</body>
</html>
