<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Buttons</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--surface); color:var(--ink); padding:24px 28px; }
  .kicker { font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-3); margin:0 0 18px; }
  .row { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
  .label { font-family:var(--font-mono); font-size:10px; color:var(--ink-3); width:64px; text-transform:uppercase; }
  .btn { font-family:var(--font-sans); font-size:15px; font-weight:600; border:none; cursor:pointer; border-radius:999px; padding:11px 22px; display:inline-flex; align-items:center; gap:8px; }
  .primary { background:var(--coral); color:#fff; box-shadow:var(--shadow-coral); }
  .primary.hover { background:var(--coral-deep); }
  .primary.press { background:var(--coral-deep); transform:scale(.97); box-shadow:none; }
  .secondary { background:var(--surface); color:var(--ink); border:1.5px solid var(--line-strong); }
  .ghost { background:transparent; color:var(--coral-deep); }
  .small { padding:7px 16px; font-size:13px; }
  .disabled { background:var(--paper-2); color:var(--ink-4); box-shadow:none; cursor:not-allowed; }
</style>
</head>
<body>
  <p class="kicker">Buttons — pill shape, coral primary</p>
  <div class="row">
    <span class="label">rest</span>
    <button class="btn primary">Answer now</button>
    <button class="btn secondary">Skip</button>
    <button class="btn ghost">See later</button>
    <button class="btn primary small">Send</button>
  </div>
  <div class="row">
    <span class="label">states</span>
    <button class="btn primary hover">Hover</button>
    <button class="btn primary press">Pressed</button>
    <button class="btn primary disabled">Disabled</button>
  </div>
</body>
</html>
