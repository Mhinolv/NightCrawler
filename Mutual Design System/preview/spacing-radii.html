<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Radii</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--surface); color:var(--ink); padding:24px 28px; }
  .kicker { font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-3); margin:0 0 16px; }
  .row { display:flex; gap:18px; align-items:flex-end; }
  .item { text-align:center; }
  .box { background:var(--coral-soft); border:1.5px solid var(--coral-line); }
  .nm { font-size:12px; font-weight:600; margin-top:8px; }
  .v { font-family:var(--font-mono); font-size:10px; color:var(--ink-2); }
</style>
</head>
<body>
  <p class="kicker">Corner radii — soft, never sharp</p>
  <div class="row">
    <div class="item"><div class="box" style="width:64px;height:56px;border-radius:6px"></div><div class="nm">xs</div><div class="v">6px</div></div>
    <div class="item"><div class="box" style="width:64px;height:56px;border-radius:10px"></div><div class="nm">sm</div><div class="v">10px</div></div>
    <div class="item"><div class="box" style="width:64px;height:56px;border-radius:14px"></div><div class="nm">md</div><div class="v">14px</div></div>
    <div class="item"><div class="box" style="width:64px;height:56px;border-radius:20px"></div><div class="nm">lg</div><div class="v">20px</div></div>
    <div class="item"><div class="box" style="width:64px;height:56px;border-radius:28px"></div><div class="nm">xl</div><div class="v">28px</div></div>
    <div class="item"><div class="box" style="width:64px;height:56px;border-radius:999px"></div><div class="nm">pill</div><div class="v">999px</div></div>
  </div>
</body>
</html>
