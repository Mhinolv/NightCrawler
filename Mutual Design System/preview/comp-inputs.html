<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inputs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--surface); color:var(--ink); padding:24px 28px; }
  .kicker { font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-3); margin:0 0 16px; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  label { font-size:12px; font-weight:600; color:var(--ink-2); display:block; margin-bottom:6px; }
  .field { width:100%; box-sizing:border-box; font-family:var(--font-sans); font-size:15px; color:var(--ink); background:var(--surface); border:1.5px solid var(--line-strong); border-radius:14px; padding:11px 14px; }
  .field::placeholder { color:var(--ink-3); }
  .field.focus { border-color:var(--coral); box-shadow:var(--ring-focus); outline:none; }
  textarea.field { resize:none; height:64px; }
  .span2 { grid-column:1 / 3; }
</style>
</head>
<body>
  <p class="kicker">Inputs — 1.5px border, coral focus ring</p>
  <div class="grid">
    <div><label>Your name</label><input class="field" placeholder="Type your name…"></div>
    <div><label>Focused</label><input class="field focus" value="Jordan"></div>
    <div class="span2"><label>Your answer</label><textarea class="field" placeholder="Say as much or as little as you like…"></textarea></div>
  </div>
</body>
</html>
